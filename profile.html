<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile - Grow With Awino</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo-container">
                <img id="site-logo" src="images/default-logo.png" alt="Grow With Awino" class="logo">
                <span class="site-title">Grow With Awino</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="shop.html">Ebooks</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="admin.html" class="admin-link">Admin</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Change Password</h2>
            <p style="text-align: center; margin-bottom: 2rem; color: var(--text-gray);">
                Update your admin account password
            </p>
            <form id="password-form">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="current-password" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" placeholder="Minimum 6 characters" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm-new-password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Update Password</button>
            </form>
            <div class="auth-footer">
                <p><a href="admin.html">← Back to Admin Panel</a></p>
                <p><a href="#" onclick="handleAdminLogout()">Logout</a></p>
            </div>
        </div>
    </main>

    <div id="loading-spinner" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000;">
        <div class="loading"></div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
