<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Grow With Awino</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .checkout-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .order-summary, .payment-methods {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .payment-btn {
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .payment-btn:hover { transform: translateY(-2px); }
        .paypal-btn { background: #0070ba; color: white; }
        .flutterwave-btn { background: #1b9e6b; color: white; }
        .mpesa-btn { background: #49b43e; color: white; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #1e3a8a; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) { .checkout-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo-container">
                <span class="site-title">Grow With Awino</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="shop.html">Ebooks</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="checkout-container">
        <div class="order-summary">
            <h2>Order Summary</h2>
            <div id="order-items"></div>
            <div id="order-total" style="margin-top: 1rem; padding-top: 1rem; border-top: 2px solid #ddd;"></div>
        </div>
        <div class="payment-methods">
            <h2>Select Payment Method</h2>
            <button id="paypal-btn" class="payment-btn paypal-btn">
                <i class="fab fa-paypal"></i> PayPal
            </button>
            <button id="flutterwave-btn" class="payment-btn flutterwave-btn">
                <i class="fas fa-credit-card"></i> Flutterwave
            </button>
            <button id="mpesa-btn" class="payment-btn mpesa-btn">
                <i class="fas fa-mobile-alt"></i> M-Pesa
            </button>
            <div id="payment-status" style="margin-top: 1rem; text-align: center;"></div>
        </div>
    </main>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://orxrpwncwyrkmubqywhw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yeHJwd25jd3lya211YnF5d2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjYwMjYsImV4cCI6MjA5MTY0MjAyNn0.I2eYzCfOnRf9F2h9f1sfcUTHNaU6rfdjVdKAti0KR4c';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Load cart from sessionStorage
        let cart = JSON.parse(sessionStorage.getItem('checkoutCart') || '[]');
        let currentOrderId = null;
        const currency = localStorage.getItem('currency') || 'USD';
        
        if (cart.length === 0) {
            window.location.href = 'shop.html';
        }
        
        let total = 0;
        const orderItems = document.getElementById('order-items');
        
        orderItems.innerHTML = cart.map(item => {
            const price = currency === 'USD' ? item.price_usd : item.price_kes;
            total += price;
            return `<div style="display:flex; justify-content:space-between; padding:0.5rem 0;">
                <span>${escapeHtml(item.title)}</span>
                <span>${currency === 'USD' ? '$' + price : 'KES ' + price}</span>
            </div>`;
        }).join('');
        document.getElementById('order-total').innerHTML = `<strong>Total: ${currency === 'USD' ? '$' + total.toFixed(2) : 'KES ' + total}</strong>`;
        
        // Create order in database
        async function createOrder(paymentMethod) {
            const { data, error } = await supabaseClient
                .from('orders')
                .insert([{
                    user_email: 'customer@example.com',
                    product_ids: cart.map(item => item.id),
                    total_amount: total,
                    currency: currency,
                    payment_method: paymentMethod,
                    status: 'pending'
                }])
                .select();
            
            if (error) {
                console.error('Order creation error:', error);
                return null;
            }
            return data[0].id;
        }
        
        // Process PayPal payment
        async function processPayPal() {
            const statusDiv = document.getElementById('payment-status');
            statusDiv.innerHTML = '<div class="loading"></div> Redirecting to PayPal...';
            
            const orderId = await createOrder('paypal');
            
            try {
                // UPDATED: Using Vercel API path (/api/ instead of /.netlify/functions/)
                const response = await fetch('/api/create-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        method: 'paypal',
                        amount: total,
                        currency: currency,
                        orderId: orderId
                    })
                });
                
                const data = await response.json();
                
                if (data.approvalUrl) {
                    window.location.href = data.approvalUrl;
                } else {
                    statusDiv.innerHTML = '<span style="color:#dc2626;">Payment failed. Please try again.</span>';
                }
            } catch (error) {
                statusDiv.innerHTML = '<span style="color:#dc2626;">Error: ' + error.message + '</span>';
            }
        }
        
        // Process Flutterwave payment
        async function processFlutterwave() {
            const statusDiv = document.getElementById('payment-status');
            statusDiv.innerHTML = '<div class="loading"></div> Preparing Flutterwave...';
            
            const orderId = await createOrder('flutterwave');
            const email = prompt('Enter your email address for receipt:', 'customer@example.com');
            
            if (!email) {
                statusDiv.innerHTML = '<span style="color:#dc2626;">Email is required.</span>';
                return;
            }
            
            try {
                // UPDATED: Using Vercel API path
                const response = await fetch('/api/create-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        method: 'flutterwave',
                        amount: total,
                        currency: currency,
                        email: email,
                        orderId: orderId
                    })
                });
                
                const data = await response.json();
                
                if (data.paymentLink) {
                    window.location.href = data.paymentLink;
                } else {
                    statusDiv.innerHTML = '<span style="color:#dc2626;">Payment failed. Please try again.</span>';
                }
            } catch (error) {
                statusDiv.innerHTML = '<span style="color:#dc2626;">Error: ' + error.message + '</span>';
            }
        }
        
        // Process M-Pesa payment
        async function processMpesa() {
            const statusDiv = document.getElementById('payment-status');
            
            const phone = prompt('Enter your M-Pesa phone number (e.g., 2547XXXXXXXX):', '2547');
            if (!phone) {
                statusDiv.innerHTML = '<span style="color:#dc2626;">Phone number is required.</span>';
                return;
            }
            
            statusDiv.innerHTML = '<div class="loading"></div> Initiating M-Pesa payment...';
            
            const orderId = await createOrder('mpesa');
            
            try {
                // UPDATED: Using Vercel API path
                const response = await fetch('/api/create-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        method: 'mpesa',
                        amount: Math.round(total),
                        phoneNumber: phone,
                        orderId: orderId
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    statusDiv.innerHTML = '<span style="color:#22c55e;">STK push sent! Check your phone and enter PIN.</span>';
                    
                    // Poll for payment status
                    let attempts = 0;
                    const interval = setInterval(async () => {
                        attempts++;
                        // UPDATED: Using Vercel API path
                        const statusResponse = await fetch(`/api/verify-payment?checkoutRequestID=${data.checkoutRequestID}`);
                        const statusData = await statusResponse.json();
                        
                        if (statusData.status === 'completed') {
                            clearInterval(interval);
                            statusDiv.innerHTML = '<span style="color:#22c55e;">Payment successful! Redirecting...</span>';
                            localStorage.removeItem('cart');
                            sessionStorage.removeItem('checkoutCart');
                            setTimeout(() => { window.location.href = 'success.html'; }, 2000);
                        } else if (statusData.status === 'failed' || attempts > 30) {
                            clearInterval(interval);
                            statusDiv.innerHTML = '<span style="color:#dc2626;">Payment failed or timeout. Please try again.</span>';
                        }
                    }, 2000);
                } else {
                    statusDiv.innerHTML = '<span style="color:#dc2626;">Payment initiation failed: ' + (data.error || 'Unknown error') + '</span>';
                }
            } catch (error) {
                statusDiv.innerHTML = '<span style="color:#dc2626;">Error: ' + error.message + '</span>';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Attach event listeners
        document.getElementById('paypal-btn').addEventListener('click', processPayPal);
        document.getElementById('flutterwave-btn').addEventListener('click', processFlutterwave);
        document.getElementById('mpesa-btn').addEventListener('click', processMpesa);
    </script><!-- Visitor Tracking -->
<script>
    (function() {
        const today = new Date().toISOString().split('T')[0];
        const lastVisit = localStorage.getItem('lastVisit');
        
        if (!lastVisit || lastVisit !== today) {
            fetch('/api/track-visitor', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(() => localStorage.setItem('lastVisit', today))
            .catch(err => console.log('Tracking error:', err));
        }
    })();
</script>
</body>
</html>
