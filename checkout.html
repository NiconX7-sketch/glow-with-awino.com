<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Grow With Awino</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_LIVE_PAYPAL_CLIENT_ID&currency=USD"></script>
    <style>
        /* Your existing styles plus: */
        .payment-option { margin: 1rem 0; }
        .payment-option label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .mpesa-input { display: none; margin-top: 1rem; }
        .mpesa-input.active { display: block; }
        .status-message { margin-top: 1rem; padding: 0.75rem; border-radius: 10px; display: none; }
        .status-success { background: #dcfce7; color: #166534; }
        .status-error { background: #fee2e2; color: #991b1b; }
        .status-info { background: #e2e8f0; color: #475569; }
    </style>
</head>
<body>
    <!-- Your existing header/navbar HTML -->

    <main class="checkout-container">
        <div class="order-summary">
            <h2>Order Summary</h2>
            <div id="order-items"></div>
            <div id="order-total"></div>
        </div>
        
        <div class="payment-methods">
            <h2>Select Payment Method</h2>
            
            <div class="payment-option">
                <label>
                    <input type="radio" name="paymentMethod" value="paypal" checked>
                    <i class="fab fa-paypal"></i> PayPal
                </label>
            </div>
            
            <div class="payment-option">
                <label>
                    <input type="radio" name="paymentMethod" value="paystack_card">
                    <i class="fas fa-credit-card"></i> Card / Bank / USSD
                </label>
            </div>
            
            <div class="payment-option">
                <label>
                    <input type="radio" name="paymentMethod" value="mpesa">
                    <i class="fas fa-mobile-alt"></i> M-Pesa (STK Push)
                </label>
            </div>
            
            <div id="mpesa-input" class="mpesa-input">
                <input type="tel" id="mpesa-phone" placeholder="0743 123456" class="form-input">
                <input type="email" id="mpesa-email" placeholder="Your email address" class="form-input">
            </div>
            
            <div id="paypal-button-container" style="margin-top: 1rem;"></div>
            
            <button id="paystack-btn" class="paystack-btn" style="display: none;">Pay with Paystack</button>
            <button id="mpesa-pay-btn" class="payment-btn mpesa-btn" style="display: none;">
                <i class="fas fa-mobile-alt"></i> Pay with M-Pesa
            </button>
            
            <div id="payment-status" class="status-message"></div>
        </div>
    </main>

    <script>
        let cart = JSON.parse(sessionStorage.getItem('checkoutCart') || '[]');
        if (cart.length === 0) window.location.href = 'shop.html';
        
        const currency = localStorage.getItem('currency') || 'USD';
        let total = 0;
        
        // Display order summary
        const orderItemsDiv = document.getElementById('order-items');
        orderItemsDiv.innerHTML = cart.map(item => {
            const price = currency === 'USD' ? item.price_usd : item.price_kes;
            total += price;
            return `<div class="order-item"><span>${escapeHtml(item.title)}</span><span>${currency === 'USD' ? '$' + price : 'KES ' + price}</span></div>`;
        }).join('');
        document.getElementById('order-total').innerHTML = `<strong>Total: ${currency === 'USD' ? '$' + total : 'KES ' + total}</strong>`;
        
        const paypalAmount = currency === 'USD' ? total : total / 130;
        
        // Show/hide payment options
        document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('paypal-button-container').style.display = this.value === 'paypal' ? 'block' : 'none';
                document.getElementById('paystack-btn').style.display = this.value === 'paystack_card' ? 'block' : 'none';
                document.getElementById('mpesa-input').classList.toggle('active', this.value === 'mpesa');
                document.getElementById('mpesa-pay-btn').style.display = this.value === 'mpesa' ? 'block' : 'none';
            });
        });
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('payment-status');
            statusDiv.textContent = message;
            statusDiv.className = `status-message status-${type}`;
            statusDiv.style.display = 'block';
        }
        
        // PayPal Integration
        if (document.getElementById('paypal-button-container')) {
            paypal.Buttons({
                createOrder: (data, actions) => actions.order.create({
                    purchase_units: [{ amount: { value: paypalAmount.toFixed(2), currency_code: 'USD' } }]
                }),
                onApprove: async (data, actions) => {
                    const capture = await actions.order.capture();
                    // Verify payment on server
                    const verifyRes = await fetch('/api/verify-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            transactionId: capture.id,
                            paymentMethod: 'paypal',
                            amount: total,
                            cart: cart
                        })
                    });
                    const result = await verifyRes.json();
                    if (result.success) {
                        sessionStorage.setItem('downloadToken', result.downloadToken);
                        sessionStorage.setItem('purchasedCart', JSON.stringify(cart));
                        window.location.href = 'success.html';
                    } else {
                        showStatus('Payment verification failed', 'error');
                    }
                },
                onError: (err) => showStatus('PayPal error', 'error')
            }).render('#paypal-button-container');
        }
        
        // Paystack Integration
        document.getElementById('paystack-btn').addEventListener('click', () => {
            const email = prompt('Enter your email:', '');
            if (!email) return showStatus('Email required', 'error');
            
            const handler = PaystackPop.setup({
                key: 'YOUR_PAYSTACK_PUBLIC_KEY', // Use env var in production
                email: email,
                amount: Math.round(total * 100),
                currency: currency,
                callback: async (response) => {
                    const verifyRes = await fetch('/api/verify-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            transactionId: response.reference,
                            paymentMethod: 'paystack',
                            amount: total,
                            cart: cart
                        })
                    });
                    const result = await verifyRes.json();
                    if (result.success) {
                        sessionStorage.setItem('downloadToken', result.downloadToken);
                        sessionStorage.setItem('purchasedCart', JSON.stringify(cart));
                        window.location.href = 'success.html';
                    }
                },
                onClose: () => showStatus('Payment cancelled', 'error')
            });
            handler.openIframe();
        });
        
        // M-Pesa Integration
        document.getElementById('mpesa-pay-btn').addEventListener('click', async () => {
            const phone = document.getElementById('mpesa-phone').value;
            const email = document.getElementById('mpesa-email').value;
            
            if (!phone || !email) {
                return showStatus('Phone number and email required', 'error');
            }
            
            showStatus('Sending STK push to your phone...', 'info');
            
            const response = await fetch('/api/create-mpesa-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: total, phoneNumber: phone, email: email, cart: cart })
            });
            
            const data = await response.json();
            if (data.success) {
                showStatus('STK push sent! Check your phone and enter PIN', 'success');
                // Poll for payment status
                let attempts = 0;
                const interval = setInterval(async () => {
                    attempts++;
                    const statusRes = await fetch(`/api/verify-payment?reference=${data.reference}`);
                    const statusData = await statusRes.json();
                    if (statusData.success) {
                        clearInterval(interval);
                        sessionStorage.setItem('downloadToken', statusData.downloadToken);
                        sessionStorage.setItem('purchasedCart', JSON.stringify(cart));
                        window.location.href = 'success.html';
                    } else if (attempts > 30) {
                        clearInterval(interval);
                        showStatus('Payment timeout. Check your M-Pesa statement.', 'error');
                    }
                }, 2000);
            } else {
                showStatus('M-Pesa payment failed: ' + (data.error || 'Unknown error'), 'error');
            }
        });
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
