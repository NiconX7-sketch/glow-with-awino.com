<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful - Grow With Awino</title>
    <style>
        .container { max-width: 800px; margin: 3rem auto; text-align: center; padding: 2rem; }
        .download-btn { background: #C66B3D; color: white; padding: 1rem 2rem; border-radius: 40px; text-decoration: none; display: inline-block; margin: 1rem; }
        .download-link { display: block; margin: 1rem 0; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Payment Successful!</h1>
        <p>Thank you for your purchase. Your download links are below:</p>
        
        <div id="download-links"></div>
        
        <div id="error-message" class="error" style="display:none;"></div>
        
        <a href="shop.html" class="download-btn">Continue Shopping</a>
    </div>

    <script>
        const downloadToken = sessionStorage.getItem('downloadToken');
        const purchasedCart = JSON.parse(sessionStorage.getItem('purchasedCart') || '[]');
        
        if (!downloadToken || purchasedCart.length === 0) {
            document.getElementById('error-message').innerHTML = 'No valid purchase found. Please contact support.';
            document.getElementById('error-message').style.display = 'block';
        } else {
            const downloadLinksDiv = document.getElementById('download-links');
            
            Promise.all(purchasedCart.map(async (item) => {
                const response = await fetch(`/api/get-download-link?token=${downloadToken}&productId=${item.id}`);
                const data = await response.json();
                if (data.downloadUrl) {
                    return `<div class="download-link">
                        <strong>${escapeHtml(item.title)}</strong><br>
                        <a href="${data.downloadUrl}" class="download-btn" download>📥 Download Now</a>
                    </div>`;
                }
                return `<div>${escapeHtml(item.title)} - <span style="color:#666;">Download link will be emailed within 24 hours</span></div>`;
            })).then(links => {
                downloadLinksDiv.innerHTML = links.join('');
                // Clear sensitive data
                sessionStorage.removeItem('downloadToken');
                sessionStorage.removeItem('purchasedCart');
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
